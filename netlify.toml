[build]
  publish = "public"
  command = "hugo"

[build.environment]
  HUGO_VERSION = "0.160.0"

# Decap CMS admin — requires Netlify Identity + Git Gateway enabled in Netlify dashboard.
# Admin UI lives at /admin/ (static/admin/). Not linked from the public site.
# To activate: Netlify dashboard → Identity → Enable → Git Gateway → Enable.
# Then: Identity → Invite users → add your email.

# Production deploys restricted to main branch only.
# This conserves Netlify free tier credits (300/month, 15 per deploy).
# Do not remove this restriction — pushes to any other branch must not trigger deploys.
[[context.branch-deploy]]
  command = ""

[context.production]
  branch = "main"

[context.production.environment]
  HUGO_ENV = "production"
