{{ define "title" }}{{ .Title }} - {{ .Site.Title }}{{ end }}

{{ define "main" }}
<main class="work-page">
    <div class="work-image">
        {{ with .Params.image }}
        <img src="{{ . }}" alt="{{ $.Title }}">
        {{ end }}
    </div>

    {{ with .Params.gallery }}
    <div class="work-gallery">
        {{ range . }}
        <img src="{{ . }}" alt="{{ $.Title }}">
        {{ end }}
    </div>
    {{ end }}

    <div class="work-details">
        {{ partial "caption.html" . }}

        {{ with .Content }}
        <div class="work-body">
            {{ . }}
        </div>
        {{ end }}

        <nav class="work-nav">
            <a href="/portfolio/">← Back</a>
        </nav>
    </div>
</main>
{{ end }}
