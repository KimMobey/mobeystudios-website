{{ define "title" }}Portfolio - {{ .Site.Title }}{{ end }}

{{ define "main" }}
<main class="portfolio-page">
    <h1>Portfolio</h1>

    {{ partial "filters.html" . }}

    <div class="portfolio-grid" id="portfolio-grid">
        {{ range sort .Pages "Params.order" "asc" }}
        {{ if .Params.visible }}
        {{ partial "card.html" . }}
        {{ end }}
        {{ end }}
    </div>
</main>
{{ end }}

{{ define "scripts" }}
<script>
(function () {
  var active = { form: '*', status: '*' };

  function applyFilters() {
    document.querySelectorAll('#portfolio-grid .work-card').forEach(function (card) {
      var formMatch   = active.form   === '*' || card.classList.contains(active.form.slice(1));
      var statusMatch = active.status === '*' || card.classList.contains(active.status.slice(1));
      card.style.display = (formMatch && statusMatch) ? '' : 'none';
    });
  }

  function updateURL() {
    var params = new URLSearchParams();
    if (active.form   !== '*') params.set('form',   active.form.replace(/^\.form-/, ''));
    if (active.status !== '*') params.set('status', active.status.replace(/^\.status-/, ''));
    var qs = params.toString();
    history.replaceState(null, '', qs ? '?' + qs : window.location.pathname);
  }

  function activateButton(filterValue) {
    var btn = document.querySelector('.filter-option[data-filter="' + filterValue + '"]');
    if (!btn) return;
    var group = btn.closest('.filter-group');
    if (group) group.querySelectorAll('.filter-option').forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');
  }

  var params = new URLSearchParams(window.location.search);
  var urlForm   = params.get('form');
  var urlStatus = params.get('status');
  if (urlForm)   { active.form   = '.form-'   + urlForm;   activateButton(active.form); }
  if (urlStatus) { active.status = '.status-' + urlStatus; activateButton(active.status); }
  applyFilters();

  // Store current URL (with active filters) before navigating to a work page
  document.getElementById('portfolio-grid').addEventListener('click', function (e) {
    var link = e.target.closest('a[href]');
    if (link && link.href.indexOf('/portfolio/') !== -1 && link.href !== window.location.href) {
      try { sessionStorage.setItem('portfolio-back-url', window.location.href); } catch (_) {}
    }
  });

  document.querySelectorAll('.filter-group').forEach(function (group) {
    var groupKey = group.dataset.group;
    group.querySelectorAll('.filter-option').forEach(function (btn) {
      btn.addEventListener('click', function () {
        group.querySelectorAll('.filter-option').forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        active[groupKey] = btn.dataset.filter;
        applyFilters();
        updateURL();
      });
    });
  });
}());
</script>
{{ end }}
