{{ define "title" }}{{ .Title }} - {{ .Site.Title }}{{ end }}

{{ define "main" }}
<main class="video-page">
    <article>
        <nav class="video-nav video-nav--top">
            <a href="/studio/media/">← Back</a>
        </nav>

        <header>
            <h1>{{ .Title }}</h1>
        </header>

        {{ with .Params.youtube_id }}
        <div class="video-embed">
            {{ partial "youtube.html" . }}
        </div>
        {{ end }}

        <div class="video-description">
            {{ .Content }}
        </div>

        <nav class="video-nav page-end-nav">
            <a href="/studio/media/">← Back</a>
        </nav>
    </article>
</main>
{{ end }}
