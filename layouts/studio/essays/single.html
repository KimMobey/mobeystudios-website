{{ define "title" }}{{ .Title }} - {{ .Site.Title }}{{ end }}

{{ define "main" }}
<main class="essay-page">
    <article>
        <header>
            <h1>{{ .Title }}</h1>
            <time>{{ .Date.Format "January 2, 2006" }}</time>
        </header>
        
        <div class="essay-content">
            {{ .Content }}
        </div>
        
        <nav class="essay-nav">
            <a href="/studio/essays/">← Back to Essays</a>
        </nav>
    </article>
</main>
{{ end }}
