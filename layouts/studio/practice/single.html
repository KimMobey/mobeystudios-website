{{ define "title" }}{{ .Title }} - {{ .Site.Title }}{{ end }}

{{ define "main" }}
<main class="article-page">
    <article>
        <header>
            <h1>{{ .Title }}</h1>
            <time>{{ .Date.Format "January 2, 2006" }}</time>
        </header>
        
        <div class="article-content">
            {{ .Content }}
        </div>
        
        <nav class="article-nav">
            <a href="/studio/practice/">← Back to Studio Practice</a>
        </nav>
    </article>
</main>
{{ end }}
