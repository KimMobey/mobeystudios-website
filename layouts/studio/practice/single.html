{{ define "title" }}{{ .Title }} - {{ .Site.Title }}{{ end }}

{{ define "main" }}
<main class="article-page">
    <article>
        <nav class="article-nav article-nav--top">
            <a href="/studio/practice/">← Back</a>
        </nav>

        <header>
            <h1>{{ .Title }}</h1>
        </header>

        <div class="article-content">
            {{ .Content }}
        </div>

        <nav class="article-nav page-end-nav">
            <a href="/studio/practice/">← Back</a>
        </nav>
    </article>
</main>
{{ end }}

{{ define "scripts" }}
<script>
(function () {
    var content = document.querySelector('.article-content');
    if (!content) return;

    // Wrap each pure-image paragraph in a <figure>, pulling the following
    // italic-only paragraph (if any) up as the figcaption.
    var imgParas = Array.from(content.querySelectorAll('p')).filter(function (p) {
        return p.children.length === 1 && p.firstElementChild.tagName === 'IMG';
    });

    imgParas.forEach(function (p) {
        var next = p.nextElementSibling;
        var fig  = document.createElement('figure');
        fig.className = 'article-figure';

        p.parentNode.insertBefore(fig, p);
        fig.appendChild(p);

        if (next && next.tagName === 'P' && next.children.length === 1 && next.firstElementChild.tagName === 'EM') {
            var caption = document.createElement('figcaption');
            caption.innerHTML = next.firstElementChild.innerHTML;
            fig.appendChild(caption);
            next.remove();
        }
    });

    // No figures? Leave the content as a single text column.
    if (imgParas.length === 0) return;

    // Two independent flow columns on desktop, source-order block flow on mobile.
    // Resize-aware: the layout swaps when the viewport crosses 768px in either
    // direction, so a desktop→mobile resize doesn't strand all images at the top.
    var query = window.matchMedia('(min-width: 768px)');
    var originalOrder = Array.from(content.children);
    var grid = null;

    function rearrange() {
        if (grid) return;
        grid = document.createElement('div');
        grid.className = 'article-grid';
        var imagesCol = document.createElement('div');
        imagesCol.className = 'article-grid__images';
        var textCol = document.createElement('div');
        textCol.className = 'article-grid__text';
        grid.appendChild(imagesCol);
        grid.appendChild(textCol);
        content.appendChild(grid);

        originalOrder.forEach(function (child) {
            if (child.classList && child.classList.contains('article-figure')) {
                imagesCol.appendChild(child);
            } else {
                textCol.appendChild(child);
            }
        });
    }

    function restore() {
        if (!grid) return;
        originalOrder.forEach(function (child) { content.appendChild(child); });
        grid.remove();
        grid = null;
    }

    function syncLayout() {
        if (query.matches) rearrange();
        else restore();
    }

    syncLayout();
    query.addEventListener('change', syncLayout);
}());
</script>

{{ end }}
