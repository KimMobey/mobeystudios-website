<nav class="filters" aria-label="Filter portfolio">
    <div class="filter-group" data-group="form">
        <button class="filter-option active" data-filter="*">All</button>
        {{ range .Site.Taxonomies.forms }}
        <button class="filter-option" data-filter=".form-{{ .Page.Title | urlize }}">{{ .Page.Title }}</button>
        {{ end }}
    </div>

    <div class="filter-group" data-group="status">
        <button class="filter-option active" data-filter="*">All</button>
        {{ range .Site.Taxonomies.statuses }}
        <button class="filter-option" data-filter=".status-{{ .Page.Title | urlize }}">{{ .Page.Title }}</button>
        {{ end }}
    </div>
</nav>
