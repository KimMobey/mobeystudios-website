<div class="filters">
    <div class="filter-group">
        <h3>Form</h3>
        <button class="filter-button active" data-filter="*" aria-pressed="true">All</button>
        {{ range .Site.Taxonomies.forms }}
        <button class="filter-button" data-filter=".form-{{ .Page.Title | urlize }}" aria-pressed="false">{{ .Page.Title }}</button>
        {{ end }}
    </div>

    <div class="filter-group">
        <h3>Status</h3>
        <button class="filter-button active" data-filter="*" aria-pressed="true">All</button>
        {{ range .Site.Taxonomies.statuses }}
        <button class="filter-button" data-filter=".status-{{ .Page.Title | urlize }}" aria-pressed="false">{{ .Page.Title }}</button>
        {{ end }}
    </div>
</div>
