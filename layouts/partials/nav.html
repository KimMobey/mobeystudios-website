<header>
    <div class="header-container">
        <a href="/" class="site-name">{{ .Site.Title }}</a>
        <button class="nav-toggle" aria-controls="main-nav" aria-expanded="false" aria-label="Toggle navigation">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="main-nav" aria-label="Main navigation">
            {{ range .Site.Menus.main }}
            <a href="{{ .URL }}"{{ if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }} aria-current="page"{{ end }}>{{ .Name }}</a>
            {{ end }}
        </nav>
    </div>
</header>
