<script>
(function () {
  var STORE = 'kim-liked-works';

  function load() {
    try { return JSON.parse(localStorage.getItem(STORE)) || []; }
    catch (e) { return []; }
  }
  function save(list) {
    localStorage.setItem(STORE, JSON.stringify(list));
  }

  function applyLiked(btn, liked) {
    btn.classList.toggle('liked', liked);
    btn.setAttribute('aria-label', liked ? 'Remove from favourites' : 'Save to favourites');
  }

  function syncButtons() {
    var list = load();
    document.querySelectorAll('.like-btn').forEach(function (btn) {
      applyLiked(btn, list.some(function (w) { return w.title === btn.dataset.title; }));
    });
  }

  // Teleport the strip into the page-end-nav if the current page has one,
  // so the strip shares a row with the bottom back link.
  (function () {
    var strip = document.getElementById('selection-strip');
    var endNav = document.querySelector('.page-end-nav');
    if (strip && endNav && strip.parentNode !== endNav) {
      endNav.appendChild(strip);
    }
  }());

  function updateStrip() {
    var strip = document.getElementById('selection-strip');
    if (!strip) return;
    var label = document.getElementById('selection-strip-label');
    var n     = load().length;
    if (!n) {
      strip.classList.remove('visible');
      return;
    }
    strip.classList.add('visible');
    if (label) {
      label.textContent = n === 1
        ? 'Enquire about your selected artwork'
        : 'Enquire about your ' + n + ' selected artworks';
    }
  }

  document.querySelectorAll('.like-btn').forEach(function (btn) {
    btn.addEventListener('click', function (e) {
      e.preventDefault();
      var current = load();
      var title   = btn.dataset.title;
      var image   = btn.dataset.image;
      var idx = current.findIndex(function (w) { return w.title === title; });
      if (idx >= 0) {
        current.splice(idx, 1);
        applyLiked(btn, false);
      } else {
        current.push({ title: title, image: image, url: window.location.pathname });
        applyLiked(btn, true);
      }
      save(current);
      window.dispatchEvent(new CustomEvent('savedWorksChanged'));
    });
  });

  syncButtons();
  updateStrip();
  window.addEventListener('storage',           function () { syncButtons(); updateStrip(); });
  window.addEventListener('savedWorksChanged', function () { syncButtons(); updateStrip(); });
}());
</script>
