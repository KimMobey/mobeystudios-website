backend:
  name: git-gateway
  branch: main

# Local development — writes files directly to the filesystem.
# Requires `npx decap-server` running in a separate terminal.
# Remove this line before pushing to production.
local_backend: true

# Where uploaded media is stored and served from
media_folder: static/images/portfolio
public_folder: /images/portfolio

# Admin UI is not linked from the site — access via /admin/ only
site_url: https://mobeystudios-website.netlify.app

collections:
  - name: portfolio
    label: Portfolio
    label_singular: Work
    folder: content/portfolio
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    summary: "{{title}} ({{fields.order}})"
    sortable_fields: [order, title]
    view_groups:
      - label: Status
        field: statuses
    fields:
      # — Public fields (rendered on site) —
      - label: Title
        name: title
        widget: string
        hint: "Title case. e.g. Thelma with Unfallen Rain"

      - label: Year
        name: year
        widget: number
        value_type: int
        required: false
        hint: "Year of completion"

      - label: Medium
        name: media
        widget: select
        options:
          - oil
          - acrylic
          - pastel
          - charcoal
          - ink
          - mixed-media
          - bronze
          - resin
          - pewter
          - concrete
          - linocut
          - etching
          - screenprint
          - aquarelle

      - label: Substrate
        name: substrate
        widget: string
        hint: "e.g. canvas, linen, board, paper"

      - label: Dimensions
        name: dimensions
        widget: string
        hint: "Format: H × W cm — e.g. 90 × 120cm"

      - label: Form
        name: forms
        widget: list
        field:
          label: Form
          name: form
          widget: select
          options:
            - portrait
            - figure
            - landscape
            - floral
            - interior
            - abstract
            - still-life
            - hybrid

      - label: Theme
        name: themes
        widget: list
        required: false
        field:
          label: Theme
          name: theme
          widget: select
          options:
            - migration
            - identity
            - mythology
            - ecology

      - label: Status
        name: statuses
        widget: select
        options:
          - available
          - reserved
          - sold

      - label: Series
        name: series
        widget: string
        required: false
        hint: "Named body of work — leave blank if none"

      # — Image fields —
      - label: Primary Image
        name: image
        widget: image
        hint: "Select or upload the primary image. Stored as /images/portfolio/filename.jpg"

      - label: Gallery (additional angles)
        name: gallery
        widget: list
        required: false
        hint: "For sculptures or multi-angle works only. Use -01/-02 suffix convention."
        field:
          label: Image
          name: image
          widget: image

      # — Admin/ordering —
      - label: Order
        name: order
        widget: string
        hint: "Catalogue number — e.g. A028. Controls sort order in portfolio grid."

      - label: Visible
        name: visible
        widget: boolean
        default: true
        hint: "Uncheck to hide from portfolio without deleting"

      - label: Featured
        name: featured
        widget: boolean
        default: false
        required: false
        hint: "Surface prominently on homepage or featured views"

      # — Private fields (not rendered on site) —
      - label: Category
        name: category
        widget: select
        options:
          - original
          - study
          - work-on-paper
          - miniature
        hint: "Controls pricing formula"

      - label: Price (EUR)
        name: price
        widget: number
        value_type: int
        hint: "Integer only — no symbol. Formula: (H + W) × 23. Floor: €1800."

      - label: Collection
        name: collection
        widget: string
        required: false
        hint: "Collector name or 'private collection' — not shown publicly"

      - label: Edition
        name: edition
        widget: string
        required: false
        hint: "Prints and cast works only — e.g. 3/15"

      # — Body text (artist statement, prose) —
      - label: Body
        name: body
        widget: markdown
        required: false
        hint: "Optional artist statement or prose. Displayed on the individual work page."
